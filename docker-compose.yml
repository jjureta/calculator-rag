services:

  # ─────────────────────────────────────────────
  # Qdrant — vector database (persists to disk)
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Ingestor — Python service that reads your
  # PDFs, chunks them, embeds via Ollama, and
  # stores vectors in Qdrant.
  # Ollama runs on the host — accessed via
  # host.docker.internal:11434
  # ─────────────────────────────────────────────
  ingestor:
    image: python:3.11-slim
    container_name: ingestor
    depends_on:
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./ingestor:/app              # ingestor scripts (see below)
      - ${PDF_DIR:-./pdfs}:/pdfs:ro  # your calculator manuals
    working_dir: /app
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - PDF_DIR=/pdfs
      - COLLECTION=calculator_manuals
      - CHUNK_SIZE=500
    command: >
      sh -c "
        pip install --quiet -r requirements.txt &&
        python ingest.py
      "
    restart: "no"

volumes:
  qdrant_storage:
